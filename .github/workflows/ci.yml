name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # MDS governance gate — must stay at 0 errors (warnings are advisory).
      # eslint exits non-zero only on errors, so this enforces the freezes
      # (§C/§B5/§H) and the donut immutability fix without blocking on the
      # pre-existing `any`/toFixed warnings we're burning down over time.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Performance budget (DESIGN.md §L): shared first-load JS < 250KB gzip.
      - name: Bundle budget
        run: npm run budget
